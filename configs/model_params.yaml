# Model Hyperparameters

# Idea 3: Dynamic TCO under climate scenarios
idea3:
  bayesian_nn:
    hidden_layers: [128, 64, 32]
    activation: relu
    dropout_rate: 0.1
    prior_sigma: 1.0
    learning_rate: 0.001
    batch_size: 256
    epochs: 200
    kl_weight: 0.01
    mc_samples: 50  # forward passes for uncertainty estimation
    early_stopping_patience: 20

  ensemble:
    n_estimators: 5
    xgboost:
      max_depth: 6
      learning_rate: 0.1
      n_estimators: 300
      subsample: 0.8
      colsample_bytree: 0.8
    random_forest:
      n_estimators: 500
      max_depth: 12
      min_samples_leaf: 5

# Idea 5: Extreme weather & insurance
idea5:
  survival:
    model_type: weibull_aft  # cox_ph or weibull_aft
    penalizer: 0.01
    l1_ratio: 0.0

  event_classifier:
    model_type: xgboost
    max_depth: 5
    learning_rate: 0.1
    n_estimators: 200
    scale_pos_weight: 3.0  # class imbalance adjustment
    eval_metric: aucpr

  insurance_regressor:
    model_type: quantile_gbm
    quantiles: [0.05, 0.25, 0.50, 0.75, 0.95]
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.08

# Monte Carlo simulation
monte_carlo:
  n_simulations: 10000
  discount_rate: 0.07
  inflation_rate: 0.025
  horizon_years: [10, 15]
  confidence_level: 0.95
  random_seed: 42

# Data splitting
data:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
